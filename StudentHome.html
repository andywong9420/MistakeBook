<template id="view-student">
  <div class="space-y-6">
    <!-- Today's Reviews -->
    <div class="bg-amber-50 rounded-xl p-5 border border-amber-200 shadow-sm">
      <h2 class="text-lg font-bold text-amber-800 mb-3 flex items-center">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        今日重溫任務 Today's Review
      </h2>
      <div id="reviewList" class="space-y-3">
        <p class="text-amber-700 text-sm italic">載入中 Loading tasks...</p>
      </div>
    </div>

    <!-- New Error Log Form -->
    <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
      <h2 class="text-lg font-bold text-slate-800 mb-4">新增錯題 Log New Mistake</h2>
      <form id="errorForm" onsubmit="handleErrorSubmit(event)" class="space-y-4">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold text-slate-700">評估名稱 Assessment</label>
            <input type="text" id="assessmentName" required placeholder="e.g. Chapter 3 Quiz">
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-700">日期 Date</label>
            <input type="date" id="assessmentDate" required>
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-700">課題 Topic</label>
            <select id="topic" required><option value="">Select Topic...</option></select>
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-700">題號 Question No.</label>
            <input type="text" id="questionNo" required placeholder="e.g. Q4(b)">
          </div>
          <div class="md:col-span-2">
            <label class="text-sm font-semibold text-slate-700">錯誤類型 Error Type</label>
            <select id="errorType" required><option value="">Select Error Type...</option></select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2 border-t border-slate-100 mt-2">
          <div>
            <label class="text-sm font-semibold text-slate-700">錯題照片 Wrong Work</label>
            <input type="file" id="wrongWorkFile" accept="image/*" class="mt-1 block text-sm" required>
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-700">正解照片 Correct Answer</label>
            <input type="file" id="correctAnswerFile" accept="image/*" class="mt-1 block text-sm" required>
          </div>
        </div>

        <div>
          <label class="text-sm font-semibold text-slate-700">反思 Reflection (Why did I get this wrong?)</label>
          <textarea id="reflection" rows="2" required></textarea>
        </div>

        <div class="flex items-center">
          <input type="checkbox" id="corrected" value="true" class="h-4 w-4 text-blue-600 rounded border-slate-300">
          <label class="ml-2 block text-sm text-slate-700">已完成訂正 I have done the correction</label>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary w-full mt-4">提交 Submit</button>
      </form>
    </div>
  </div>
</template>

<script>
  async function initStudentView() {
    google.script.run.withSuccessHandler(populateOptions).getInitialFormOptions();
    fetchReviews();
  }

  function populateOptions(opts) {
    const topicSel = document.getElementById('topic');
    opts.topics.forEach(t => topicSel.add(new Option(t, t)));
    
    const errSel = document.getElementById('errorType');
    opts.errorTypes.forEach(e => errSel.add(new Option(e, e)));
  }

  function fetchReviews() {
    google.script.run.withSuccessHandler(renderReviews).getTodayReviews(currentUser.email);
  }

  function renderReviews(reviews) {
    const list = document.getElementById('reviewList');
    if (reviews.length === 0) {
      list.innerHTML = '<p class="text-amber-700 text-sm">今日無須重溫。 Awesome! No tasks today.</p>';
      return;
    }
    
    let html = '';
    reviews.forEach(r => {
      const driveUrl = "https://drive.google.com/uc?export=view&id=";
      html += `
        <div class="bg-white p-4 rounded-lg shadow-sm border border-amber-100" id="review-${r.ReviewID}">
          <div class="flex justify-between items-start mb-2">
            <div>
              <span class="inline-block px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded font-medium">${r.errorDetail.Topic}</span>
              <span class="inline-block px-2 py-1 bg-red-100 text-red-600 text-xs rounded font-medium">${r.errorDetail.ErrorType}</span>
            </div>
            <span class="text-xs font-bold text-slate-400">+${r.IntervalDays}D</span>
          </div>
          <p class="text-sm font-medium mb-3">${r.errorDetail.AssessmentName} - ${r.errorDetail.QuestionNo}</p>
          <div class="flex gap-2 mb-3">
            <a href="${driveUrl}${r.errorDetail.WrongWorkFileId}" target="_blank" class="text-xs text-blue-600 underline">View Wrong</a>
            <a href="${driveUrl}${r.errorDetail.CorrectAnswerFileId}" target="_blank" class="text-xs text-blue-600 underline">View Correct</a>
          </div>
          <p class="text-xs text-slate-600 italic bg-slate-50 p-2 rounded mb-3">Reflection: ${r.errorDetail.Reflection}</p>
          <div class="flex gap-2">
            <button onclick="submitReview('${r.ReviewID}', 'NeedsReview')" class="btn-secondary text-xs flex-1 py-1">需要再溫 Needs Review</button>
            <button onclick="submitReview('${r.ReviewID}', 'Mastered')" class="btn-primary text-xs flex-1 py-1 bg-green-600 hover:bg-green-700">已掌握 Mastered</button>
          </div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  function submitReview(reviewId, action) {
    document.getElementById(`review-${reviewId}`).style.opacity = '0.5';
    google.script.run.withSuccessHandler((res) => {
      if(res.success) {
        document.getElementById(`review-${reviewId}`).remove();
        alert('記錄成功 Saved!');
      } else { alert(res.message); }
    }).submitReviewResult(reviewId, action);
  }

  async function handleErrorSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = 'Uploading...';

    try {
      const wrongFile = document.getElementById('wrongWorkFile').files[0];
      const correctFile = document.getElementById('correctAnswerFile').files[0];
      
      const payload = {
        assessmentName: document.getElementById('assessmentName').value,
        assessmentDate: document.getElementById('assessmentDate').value,
        topic: document.getElementById('topic').value,
        questionNo: document.getElementById('questionNo').value,
        errorType: document.getElementById('errorType').value,
        reflection: document.getElementById('reflection').value,
        corrected: document.getElementById('corrected').checked ? 'true' : 'false',
        wrongWorkBase64: await getBase64(wrongFile),
        correctAnswerBase64: await getBase64(correctFile)
      };

      google.script.run.withSuccessHandler(res => {
        if(res.success) {
          alert('提交成功！Successfully logged.');
          document.getElementById('errorForm').reset();
        } else {
          alert('Error: ' + res.message);
        }
        btn.disabled = false;
        btn.innerText = '提交 Submit';
      }).createErrorEntry(payload);
    } catch(err) {
      alert(err);
      btn.disabled = false;
      btn.innerText = '提交 Submit';
    }
  }
</script>
