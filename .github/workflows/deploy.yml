name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Find project root
        id: root
        run: |
          PKG_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "package.json not found!"
            exit 1
          fi
          DIR=$(dirname "$PKG_PATH")
          echo "workdir=$DIR" >> $GITHUB_OUTPUT
          echo "Found project at: $DIR"

      - name: Install dependencies
        working-directory: ${{ steps.root.outputs.workdir }}
        run: npm install

      - name: Build
        working-directory: ${{ steps.root.outputs.workdir }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.root.outputs.workdir }}/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
